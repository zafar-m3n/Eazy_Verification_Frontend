<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f24" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Title -->
    <title>EazyMarkets | Secure Client Verification Portal</title>

    <!-- Primary SEO -->
    <meta
      name="description"
      content="EazyMarkets Verification System is a secure client verification portal for submitting personal details, financial information, and required verification documents."
    />
    <meta
      name="keywords"
      content="EazyMarkets Verification, client verification, KYC verification, document upload, identity verification, EazyMarkets verification"
    />
    <meta name="author" content="EazyMarkets" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Favicon / Branding -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EazyMarkets Verification" />
    <meta property="og:title" content="EazyMarkets Verification | Secure Client Verification Portal" />
    <meta
      property="og:description"
      content="Securely submit verification information and required documents through the EazyMarkets Verification portal."
    />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="EazyMarkets Verification | Secure Client Verification Portal" />
    <meta
      name="twitter:description"
      content="Securely submit your verification details and documents through the EazyMarkets Verification portal."
    />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "EazyMarkets Verification",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "A secure client verification portal for submitting personal details, financial information, and required verification documents.",
        "publisher": {
          "@type": "Organization",
          "name": "EazyMarkets"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
